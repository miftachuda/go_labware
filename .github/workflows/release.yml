name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            goos: windows
            goarch: amd64
            output: labs.exe
            package: labware_service_windows_x64.zip
          - label: Ubuntu x64
            goos: linux
            goarch: amd64
            output: labs
            package: labware_service_ubuntu_x64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist package
          go build -trimpath -ldflags="-s -w" -o "dist/${{ matrix.output }}" .
          cp "dist/${{ matrix.output }}" package/
          cp README.md package/

      - name: Package Windows archive
        if: matrix.goos == 'windows'
        run: |
          cd package
          zip -r "../${{ matrix.package }}" .

      - name: Package Ubuntu archive
        if: matrix.goos == 'linux'
        run: tar -czf "${{ matrix.package }}" -C package .

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}
          path: ${{ matrix.package }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            release-assets/**/*.zip
            release-assets/**/*.tar.gz